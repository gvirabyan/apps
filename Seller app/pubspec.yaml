name: sellermultivendor
description: A new Flutter project.

publish_to: "none"
# version: 3.2.1+30
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  http: ^1.3.0
  shared_preferences: ^2.0.11
  connectivity_plus: ^6.0.5
  firebase_auth: ^5.0.0
  cached_network_image: ^3.4.1
  firebase_core: ^3.0.0
  intl: ^0.18.1
  shimmer: ^3.0.0
  url_launcher: ^6.1.7
  flutter_html_to_pdf:
    git:
      url: https://github.com/mohammadhprp/flutter_html_to_pdf2
  sms_autofill: ^2.3.1
  # image_picker: ^1.0.1
  fl_chart: ^1.0.0
  file_picker: ^8.0.3
  sticky_headers: ^0.3.0+2
  html_editor_enhanced: ^2.5.1
  mime: ^2.0.0
  lottie: ^3.0.0
  flutter_rating_bar: ^4.0.0
  photo_view: ^0.15.0
  flutter_widget_from_html: ^0.16.0
  provider: ^6.0.5
  google_maps_flutter: ^2.2.2
  geocoding: ^4.0.0
  geolocator: ^14.0.0
  flutter_email_sender: ^7.0.0
  bloc: ^9.0.0
  intl_phone_field: ^3.1.0
  # open_filex: ^4.3.2
  open_file: ^3.5.10
  external_path: ^2.0.1
  path_provider: ^2.0.14
  firebase_messaging: ^15.0.0
  # flutter_local_notifications: ^17.1.2
  flutter_bloc: ^9.1.0
  dio: ^5.4.0
  permission_handler: ^12.0.0+1
  device_info_plus: ^11.4.0
  meta: any
  http_parser: any
  collection: any
  awesome_notifications: ^0.10.0
  hive: ^2.2.1
  hive_flutter: ^1.1.0
  change_app_package_name: ^1.5.0
  chewie: ^1.13.0
  flutter_styled_toast: ^2.2.1
  qr: ^3.0.1

dependency_overrides:
  intl: ^0.18.1
  # chewie:
  #   git:
  #     url: https://github.com/mdeimert/chewie.git
  #     ref: master

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  just_audio: ^0.9.30
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/ic_launcher.png"
  adaptive_icon_foreground: "assets/images/icons/ic_launcher_transparent.png"
  adaptive_icon_background: "assets/images/icons/ic_launcher_background.png"
  remove_alpha_ios: true
  background_color_ios: "#FE7E7B"


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animation/
    - assets/languages/
    - assets/countryCodes/
    - assets/images/PNG/
    - assets/images/SVG/
    - assets/images/SVG/logos/
    - assets/images/flags/

  fonts:
    - family: opensans
      fonts:
        - asset: assets/font/OpenSans-Regular.ttf
