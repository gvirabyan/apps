name: deliveryboy_multivendor
description: A new Flutter project.

publish_to: "none"

# version: 3.2.1+27
version: 1.0.0+1

environment:
  sdk: ">=3.10.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  # connectivity: ^3.0.6
  shimmer: ^3.0.0
  webview_flutter: ^4.2.1
  firebase_messaging: ^15.0.0
  # flutter_local_notifications: ^17.1.2
  path_provider: ^2.1.2
  sms_autofill: ^2.3.1
  firebase_auth: ^5.0.0
  url_launcher: ^6.1.7
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  cached_network_image: ^3.3.1
  provider: ^6.1.1
  intl_phone_field: ^3.2.0
  image_picker: ^1.0.7
  flutter_bloc: ^9.1.0
  intl: ^0.18.1
  connectivity_plus: ^6.1.3
  awesome_notifications: 0.10.1
  hive: ^2.2.1
  hive_flutter: ^1.1.0
  flutter_styled_toast: ^2.2.1
  
dependency_overrides:
  intl: ^0.18.1

  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/ic_launcher.png"
  adaptive_icon_foreground: "assets/images/icons/ic_launcher_transparent.png"
  adaptive_icon_background: "assets/images/icons/ic_launcher_background.png"
  remove_alpha_ios: true
  background_color_ios: "#FE7E7B"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/PNG/
    - assets/images/SVG/
    - assets/images/SVG/logos/
    - assets/animation/
    - assets/images/flags/
    - assets/languages/
    - assets/countryCodes/

  fonts:
    - family: opensans
      fonts:
        - asset: assets/font/OpenSans-Regular.ttf
